name: Build & Publish Beta Image

on:
  push:
    branches:
      - beta

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: buzzmoody/labdash

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BETA=true
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Tailscale & Portainer Redeploy Steps ---
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Redeploy Portainer Stack (Native cURL)
        run: |
          echo "Fetching current stack state..."
          # 1. Fetch current stack configuration to preserve your Environment Variables
          STACK_INFO=$(curl -s -k -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" "${{ secrets.PORTAINER_URL }}/api/stacks/26")

          # Extract Env vars using jq (defaults to empty array if none exist)
          ENV_VARS=$(echo "$STACK_INFO" | jq -c '.Env // []')

          echo "Triggering redeploy..."
          # 2. Send the Redeploy PUT request and capture the HTTP status code
          RESPONSE=$(curl -s -k -w "\nHTTP_STATUS:%{http_code}" -X PUT "${{ secrets.PORTAINER_URL }}/api/stacks/26?endpointId=3" \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"env\": $ENV_VARS, \"prune\": true, \"pullImage\": true}")

          # Extract the HTTP status from the curl output
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d':' -f2)

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Stack successfully redeployed!"
          else
            echo "❌ Failed to redeploy. HTTP Status: $HTTP_STATUS"
            echo "Response: $RESPONSE"
            exit 1
          fi
