[www]
user  = www-data
group = www-data

; Listen on loopback TCP — nginx proxies here
listen = 127.0.0.1:9000

; Static pool: exactly 4 workers, always running.
; Predictable memory (~80 MB total) with no scaling overhead.
pm               = static
pm.max_children  = 4

; Pass all container environment variables through to PHP scripts.
; Required for BETA and any future env-var config.
clear_env = no
