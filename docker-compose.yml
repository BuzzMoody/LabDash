# =============================================================================
#  Homelab Dashboard — docker-compose.yml
# =============================================================================
#
#  Quick start:
#    docker compose up -d
#
#  Then open:  http://localhost:6969
#
#  On first run, an example services.yaml is created at ./config/services.yaml
#  Edit it to add your services, then restart:
#    docker compose restart
#
#  To use a different host port, change the left number in ports:
#    "7070:6969"   →  access at http://localhost:7070
#
#  To change the internal port as well, set the PORT env var:
#    PORT: 7070
#    ports: ["7070:7070"]
#
# =============================================================================

services:
  dashboard:
    build: .
    # image: buzzmoody/homelab-dash:latest   # uncomment to pull from registry
    container_name: homelab-dash
    ports:
      - "6969:6969"
    volumes:
      - ./config:/config
    restart: unless-stopped
    # environment:
    #   PORT: 6969    # default; change here + in ports if needed
